<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>同仁點餐意向系統</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --or:#f97316;--ord:#ea580c;--orl:#fff7ed;--orll:#ffedd5;
  --gr:#16a34a;--grl:#dcfce7;--rd:#dc2626;--rdl:#fee2e2;
  --am:#d97706;--aml:#fef3c7;--in:#4f46e5;--inl:#eef2ff;
  --sl:#1e293b;--slm:#475569;--sll:#94a3b8;
  --bg:#f8f7f4;--ca:#ffffff;--bo:#e2e8f0;--bos:#f1f5f9;
  --rsm:8px;--rmd:12px;--rlg:16px;--rxl:22px;
  --shsm:0 1px 4px rgba(0,0,0,.07);--shmd:0 4px 16px rgba(0,0,0,.10);--shlg:0 12px 40px rgba(0,0,0,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--sl);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}

/* ── TOPBAR ── */
.topbar{background:var(--ca);border-bottom:1px solid var(--bo);position:sticky;top:0;z-index:90;box-shadow:var(--shsm)}
.topbar-inner{max-width:940px;margin:0 auto;padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:9px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;color:var(--or)}
.brand-icon{width:32px;height:32px;border-radius:10px;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 2px 8px rgba(249,115,22,.35)}
.brand-sub{font-size:.68rem;color:var(--sll);font-weight:600;letter-spacing:.3px}

/* ── TABS ── */
.tab-bar{background:var(--ca);border-bottom:1px solid var(--bo)}
.tab-bar-inner{max-width:940px;margin:0 auto;padding:0 16px;display:flex}
.tab-btn{padding:11px 18px;font-size:.8rem;font-weight:700;color:var(--sll);border-bottom:3px solid transparent;transition:all .18s;white-space:nowrap}
.tab-btn:hover{color:var(--slm)}
.tab-btn.on{color:var(--or);border-bottom-color:var(--or)}
.tab-btn.on-admin{color:var(--sl);border-bottom-color:var(--sl)}

/* ── MAIN ── */
.main{max-width:940px;margin:0 auto;width:100%;padding:20px 16px 100px}

/* ── SESSION LIST (首頁) ── */
.page-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;margin-bottom:4px}
.page-sub{font-size:.8rem;color:var(--sll);margin-bottom:18px}

.event-list{display:flex;flex-direction:column;gap:10px}
.event-card{background:var(--ca);border:1.5px solid var(--bo);border-radius:var(--rlg);overflow:hidden;cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .18s}
.event-card:hover{border-color:var(--or);box-shadow:var(--shmd);transform:translateY(-2px)}
.event-card.closed-card{opacity:.6;cursor:not-allowed;pointer-events:none}
.ec-top{padding:14px 16px;border-bottom:1px solid var(--bos);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ec-left{flex:1}
.ec-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-open{background:var(--grl);color:var(--gr)}
.badge-closed{background:var(--rdl);color:var(--rd)}
.badge-soon{background:var(--aml);color:var(--am)}
.ec-title{font-weight:700;font-size:.95rem;margin-bottom:3px}
.ec-organizer{font-size:.72rem;color:var(--sll);display:flex;align-items:center;gap:4px}
.ec-right{text-align:right;flex-shrink:0}
.ec-deadline{font-size:.72rem;color:var(--rd);font-weight:700;white-space:nowrap}
.ec-deadline-label{font-size:.65rem;color:var(--sll);margin-bottom:1px}
.ec-bot{padding:10px 16px;background:var(--bos);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.ec-store{font-size:.75rem;color:var(--slm);display:flex;align-items:center;gap:4px}
.ec-count{font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px}
.ec-count.ok{background:var(--grl);color:var(--gr)}
.ec-count.warn{background:var(--aml);color:var(--am)}
.ec-count.none{background:var(--bos);color:var(--sll)}
.ec-arrow{color:var(--or);font-weight:700;font-size:1rem}
.empty-events{text-align:center;padding:50px 16px;color:var(--sll)}
.empty-events .ei{font-size:3rem;display:block;margin-bottom:10px}
.empty-events p{font-size:.85rem;font-weight:600}

/* ── ORDER PAGE ── */
.order-page-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:var(--rsm);background:var(--bos);border:1px solid var(--bo);font-size:.75rem;font-weight:700;color:var(--slm);transition:all .15s}
.back-btn:hover{background:var(--orll);color:var(--ord);border-color:var(--or)}
.event-info-banner{flex:1;background:var(--orl);border:1.5px solid var(--orll);border-radius:var(--rmd);padding:8px 12px;font-size:.78rem;color:var(--ord)}
.event-info-banner strong{font-size:.85rem;display:block;margin-bottom:1px}

/* ── NOTICE ── */
.notice{background:var(--inl);border:1.5px solid #c7d2fe;border-radius:var(--rmd);padding:10px 13px;font-size:.78rem;color:#3730a3;line-height:1.6;margin-bottom:14px;display:flex;gap:8px}

/* ── ID CARD ── */
.id-card{background:var(--ca);border:1px solid var(--bo);border-radius:var(--rlg);padding:13px 15px;margin-bottom:14px;box-shadow:var(--shsm);display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.id-card .fld{flex:1;min-width:120px}
.id-card label{display:block;font-size:.68rem;font-weight:700;color:var(--sll);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.inp,.sel{width:100%;border:1.5px solid var(--bo);border-radius:var(--rsm);padding:8px 10px;font-size:.85rem;color:var(--sl);background:var(--ca);outline:none;transition:border-color .18s,box-shadow .18s}
.inp:focus,.sel:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(249,115,22,.12)}

/* ── MENU ── */
.rest-block{margin-bottom:20px}
.rest-name{font-size:.78rem;font-weight:700;color:var(--slm);background:var(--bos);border-radius:var(--rsm);padding:5px 10px;display:inline-flex;align-items:center;gap:5px;margin-bottom:9px}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px}
@media(max-width:440px){.menu-grid{grid-template-columns:1fr 1fr}}
.m-card{background:var(--ca);border:1.5px solid var(--bo);border-radius:var(--rlg);padding:13px 11px 11px;cursor:pointer;transition:border-color .18s,transform .18s,box-shadow .18s;position:relative;overflow:hidden;user-select:none}
.m-card::after{content:'';position:absolute;inset:0;background:var(--orl);opacity:0;transition:opacity .18s;pointer-events:none}
.m-card:hover{border-color:var(--or);transform:translateY(-2px);box-shadow:var(--shmd)}
.m-card.sel{border-color:var(--or);box-shadow:var(--shmd)}
.m-card.sel::after{opacity:1}
.m-card>*{position:relative;z-index:1}
.m-emoji{font-size:1.7rem;display:block;margin-bottom:6px}
.m-name{font-weight:700;font-size:.85rem;line-height:1.3;margin-bottom:2px}
.m-desc{font-size:.68rem;color:var(--sll);line-height:1.4;margin-bottom:7px}
.m-price{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;color:var(--or)}
.m-spec{font-size:.65rem;color:var(--in);margin-top:2px}
.qty-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.qb{width:25px;height:25px;border-radius:50%;border:1.5px solid var(--bo);background:var(--ca);display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;color:var(--slm);transition:all .15s}
.qb:hover{background:var(--or);color:#fff;border-color:var(--or)}
.qn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;min-width:18px;text-align:center}

/* ── SPEC SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:var(--ca);border-radius:var(--rxl) var(--rxl) 0 0;padding:18px 18px 30px;width:100%;max-width:460px;max-height:78vh;overflow-y:auto;animation:su .23s ease}
@keyframes su{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:38px;height:4px;background:var(--bo);border-radius:2px;margin:0 auto 15px}
.sheet-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.05rem;border-left:4px solid var(--or);padding-left:9px;margin-bottom:13px}
.spec-sec{margin-bottom:12px}
.spec-lbl{font-size:.68rem;font-weight:700;color:var(--sll);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.spec-opts{display:flex;flex-wrap:wrap;gap:5px}
.spec-opt{padding:6px 12px;border:1.5px solid var(--bo);border-radius:20px;font-size:.78rem;font-weight:600;background:var(--ca);color:var(--slm);transition:all .15s}
.spec-opt:hover{border-color:var(--or);color:var(--or)}
.spec-opt.on{background:var(--or);color:#fff;border-color:var(--or)}
.note-inp{width:100%;border:1.5px solid var(--bo);border-radius:var(--rsm);padding:8px 10px;font-size:.82rem;resize:none;outline:none;transition:border-color .18s;color:var(--sl)}
.note-inp:focus{border-color:var(--or)}
.sheet-qty{display:flex;align-items:center;gap:11px;margin:12px 0}
.sqb{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bo);background:var(--ca);font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sqb:hover{background:var(--or);color:#fff;border-color:var(--or)}
.sqn{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.25rem;min-width:28px;text-align:center}

/* ── CART ── */
.cart-panel{background:var(--ca);border:1px solid var(--bo);border-radius:var(--rlg);padding:13px 15px;margin-top:14px;box-shadow:var(--shsm)}
.cart-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px dashed var(--bos);font-size:.85rem;gap:8px}
.cart-row:last-child{border:none}
.cart-spec{font-size:.7rem;color:var(--sll);margin-top:1px}
.cart-note{font-size:.7rem;color:var(--ord);margin-top:1px}
.cart-total{display:flex;justify-content:space-between;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding-top:9px;border-top:1.5px solid var(--bo);margin-top:3px}
.cart-total span:first-child{color:var(--sl)}
.cart-total span:last-child{color:var(--or)}

/* ── SUBMIT BAR ── */
.sub-bar{position:fixed;bottom:0;left:0;right:0;background:var(--ca);border-top:1px solid var(--bo);padding:11px 16px;z-index:80;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.sub-bar-inner{max-width:940px;margin:0 auto}
.sub-btn{width:100%;padding:13px;border-radius:var(--rmd);background:var(--or);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.98rem;transition:all .18s;box-shadow:0 4px 14px rgba(249,115,22,.38)}
.sub-btn:hover{background:var(--ord);transform:translateY(-1px)}
.sub-btn:disabled{background:var(--sll);box-shadow:none;cursor:not-allowed;transform:none}

/* ── RECORDS ── */
.rec-card{background:var(--ca);border:1px solid var(--bo);border-radius:var(--rlg);padding:13px 15px;margin-bottom:10px;box-shadow:var(--shsm);position:relative}
.rec-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;padding-right:26px;gap:8px}
.rec-title{font-weight:700;font-size:.88rem}
.rec-organizer{font-size:.7rem;color:var(--sll);margin-top:1px}
.rec-badge{font-size:.66rem;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;background:var(--aml);color:var(--am)}
.rec-lines{font-size:.8rem;color:var(--slm);line-height:1.75;margin-bottom:7px}
.rec-foot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--bos);font-size:.85rem;font-weight:700}
.rec-price{color:var(--or);font-family:'Nunito',sans-serif}
.rec-del{position:absolute;top:11px;right:11px;color:var(--sll);padding:3px;border-radius:4px;font-size:.85rem}
.rec-del:hover{color:var(--rd);background:var(--rdl)}
.del-cfm{position:absolute;top:8px;right:8px;background:var(--ca);border:1.5px solid var(--bo);border-radius:var(--rsm);padding:8px 10px;box-shadow:var(--shmd);z-index:10;min-width:158px}
.del-cfm p{font-size:.7rem;color:var(--rd);font-weight:700;margin-bottom:6px}
.del-cfm-btns{display:flex;gap:5px}
.dcb-k{font-size:.7rem;padding:3px 9px;border-radius:6px;border:1.5px solid var(--bo);background:var(--bos);color:var(--slm)}
.dcb-d{font-size:.7rem;padding:3px 9px;border-radius:6px;background:var(--rd);color:#fff}

/* ── ADMIN ── */
.panel{background:var(--ca);border:1px solid var(--bo);border-radius:var(--rlg);margin-bottom:13px;overflow:hidden;box-shadow:var(--shsm)}
.panel-head{padding:11px 15px;border-bottom:1px solid var(--bos);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.panel-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;display:flex;align-items:center;gap:6px}
.panel-body{padding:13px 15px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:13px}
@media(min-width:500px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat-box{background:var(--ca);border:1px solid var(--bo);border-radius:var(--rmd);padding:13px;text-align:center;box-shadow:var(--shsm)}
.stat-n{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.55rem;line-height:1;margin-bottom:2px}
.stat-l{font-size:.68rem;color:var(--sll);font-weight:600}
.k-row{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;border-bottom:1px solid var(--bos)}
.k-row:last-child{border:none}
.k-item{font-weight:700;font-size:.88rem}
.k-spec{font-size:.7rem;color:var(--sll);margin-top:1px}
.k-qty{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.35rem;color:var(--or)}
.k-sub{font-size:.7rem;color:var(--sll)}
.bar-wrap{height:4px;background:var(--bos);border-radius:2px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:2px;background:var(--or)}
.exp-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.exp-btn{padding:7px 14px;border-radius:var(--rsm);border:1.5px solid var(--bo);background:var(--ca);font-size:.75rem;font-weight:700;color:var(--slm);display:flex;align-items:center;gap:4px;transition:all .18s;box-shadow:var(--shsm)}
.exp-btn:hover{border-color:var(--sl);color:var(--sl)}
.atbl{width:100%;border-collapse:collapse;font-size:.78rem}
.atbl th{background:var(--bos);padding:8px 11px;text-align:left;font-weight:700;font-size:.68rem;color:var(--sll);text-transform:uppercase;letter-spacing:.4px;border-bottom:1.5px solid var(--bo)}
.atbl td{padding:8px 11px;border-bottom:1px solid var(--bos);vertical-align:top}
.atbl tr:hover td{background:var(--bos)}

/* 場次管理卡片 */
.ev-mgmt-card{background:var(--bos);border:1.5px solid var(--bo);border-radius:var(--rmd);padding:14px;margin-bottom:10px;position:relative}
.ev-mgmt-title{font-weight:700;font-size:.88rem;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ev-mgmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
@media(max-width:480px){.ev-mgmt-grid{grid-template-columns:1fr}}
.mg-inp{border:1.5px solid var(--bo);border-radius:6px;padding:6px 9px;font-size:.82rem;outline:none;background:var(--ca);transition:border-color .18s;width:100%}
.mg-inp:focus{border-color:var(--or)}
.mg-lbl{font-size:.68rem;font-weight:700;color:var(--sll);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.mgmt-item-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:var(--ca);border-radius:6px;padding:7px 8px;margin-bottom:5px}
.mi-em{width:46px;text-align:center}
.mi-rest{width:120px}
.mi-name{flex:1;min-width:90px}
.mi-price{width:64px}

/* ── BTNS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:var(--rsm);font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;transition:all .18s}
.btn-or{background:var(--or);color:#fff;box-shadow:0 2px 8px rgba(249,115,22,.3)}.btn-or:hover{background:var(--ord)}
.btn-out{background:var(--ca);color:var(--slm);border:1.5px solid var(--bo)}.btn-out:hover{border-color:var(--sl);color:var(--sl)}
.btn-rd{background:var(--rd);color:#fff}.btn-rd:hover{background:#b91c1c}
.btn-gr{background:var(--gr);color:#fff}.btn-gr:hover{background:#15803d}
.btn-sm{padding:4px 10px;font-size:.7rem}
.btn-full{width:100%;padding:10px;font-size:.86rem}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .18s}
.modal-box{background:var(--ca);border-radius:var(--rxl);padding:28px 24px;text-align:center;max-width:320px;width:100%;box-shadow:var(--shlg)}
.modal-ico{font-size:2.2rem;margin-bottom:8px}
.modal-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;margin-bottom:4px}
.modal-sub{font-size:.75rem;color:var(--sll);margin-bottom:16px}
.modal-inp{width:100%;border:1.5px solid var(--bo);border-radius:var(--rsm);padding:10px;font-size:.95rem;text-align:center;letter-spacing:5px;outline:none;margin-bottom:11px;transition:border-color .18s}
.modal-inp:focus{border-color:var(--or)}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:12px;right:12px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--sl);color:#fff;border-radius:var(--rsm);padding:10px 14px;font-size:.8rem;font-weight:600;max-width:270px;display:flex;align-items:center;gap:7px;box-shadow:var(--shlg);animation:tin .23s ease,tout .3s ease 2.2s forwards}
.toast.ok{background:var(--gr)}.toast.err{background:var(--rd)}.toast.warn{background:var(--am)}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{to{transform:translateX(110%);opacity:0}}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--bo);margin:12px 0}
.fbe{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}
.empty{text-align:center;padding:38px 12px;color:var(--sll)}
.empty .ei{font-size:2.8rem;display:block;margin-bottom:9px}
.empty p{font-size:.82rem;font-weight:600}
.tag{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px}
.upload-zone{border:2px dashed var(--bo);border-radius:var(--rlg);padding:18px;text-align:center;cursor:pointer;background:var(--ca);transition:all .2s;position:relative;overflow:hidden}
.upload-zone:hover{border-color:var(--in);background:var(--inl)}
.upload-sub{font-size:.72rem;color:var(--sll);margin-top:4px}
.scan-ldr{display:flex;align-items:center;justify-content:center;gap:9px;font-size:.82rem;font-weight:700;color:var(--ord);margin-top:8px}
.spin{width:20px;height:20px;border:2.5px solid var(--orll);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.menu-preview-img{max-height:180px;border-radius:var(--rmd);margin:8px auto 0;object-fit:cover;display:block}
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>

<!-- Admin Modal -->
<div class="modal-bg" id="adminModal" style="display:none">
  <div class="modal-box">

async function loadEvents(){
  if(DEMO){ S.events=demoEvents(); S.items={'e1':demoItems('e1'),'e2':demoItems2('e2')}; S.orders={'e1':demoOrders('e1'),'e2':[]}; return; }
  const today = new Date().toISOString().slice(0,10);
  // 只載入今天和未來的場次
  const {data:evs} = await sb.from('menus').select('*').gte('date', today).order('date').order('created_at');
  S.events = evs||[];
  // 批次載入所有場次的品項和訂單
  await Promise.all(S.events.map(async ev=>{
    const [{data:its},{data:ords}] = await Promise.all([
      sb.from('menu_items').select('*').eq('menu_id',ev.id).order('sort_order'),
      sb.from('orders').select('*, order_items(*)').eq('menu_id',ev.id).order('created_at',{ascending:false}),
    ]);
    S.items[ev.id] = its||[];
    S.orders[ev.id] = ords||[];
  }));
}
async function loadEventDetail(eid){
  if(DEMO) return;
  const [{data:its},{data:ords}] = await Promise.all([
    sb.from('menu_items').select('*').eq('menu_id',eid).order('sort_order'),
    sb.from('orders').select('*, order_items(*)').eq('menu_id',eid).order('created_at',{ascending:false}),
  ]);
  S.items[eid] = its||[];
  S.orders[eid] = ords||[];
}
function subscribeRT(){
  if(DEMO) return;
  sb.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'orders'},
    async()=>{ await loadEvents(); render(); }).subscribe();
}
async function dbInsertOrder(order, items){
  if(DEMO){
    const o={id:'d'+Date.now(),...order,created_at:new Date().toISOString(),order_items:items.map((it,i)=>({id:'di'+i,...it}))};
    if(!S.orders[order.menu_id]) S.orders[order.menu_id]=[];
    S.orders[order.menu_id].unshift(o); return{error:null};
  }
  const{data:o,error}=await sb.from('orders').insert(order).select().single();
  if(error) return{error};
  await sb.from('order_items').insert(items.map(it=>({...it,order_id:o.id})));
  await loadEventDetail(order.menu_id);
  return{error:null};
}
async function dbDeleteOrder(id, menuId){
  if(DEMO){ S.orders[menuId]=S.orders[menuId].filter(o=>o.id!==id); return{error:null}; }
  const r=await sb.from('orders').delete().eq('id',id);
  if(!r.error) await loadEventDetail(menuId);
  return r;
}

/* ── HOME: 場次列表 ── */
function isEventClosed(ev){
  if(!ev) return true;
  if(ev.is_closed) return true;
  const [h,m]=ev.deadline.split(':').map(Number);
  const dl=new Date(); dl.setHours(h,m,0,0);
  return new Date()>=dl;
}
function fmtDeadline(ev){
  const closed=isEventClosed(ev);
  if(ev.is_closed) return{text:'已關閉',cls:'badge-closed'};
  if(closed) return{text:'已截止',cls:'badge-closed'};
  const [h,m]=ev.deadline.split(':').map(Number);
  const dl=new Date(); dl.setHours(h,m,0,0);
  const diff=(dl-new Date())/60000;
  if(diff<30) return{text:'即將截止',cls:'badge-soon'};
  return{text:'開放中',cls:'badge-open'};
}
function renderHome(){
  let html=`<div class="page-title">今日點餐場次</div>
    <div class="page-sub">選擇您要參加的場次，即可開始點餐</div>
    <div class="event-list">`;
  const today=new Date().toISOString().slice(0,10);
  const todayEvs=S.events.filter(e=>e.date===today||!e.date);
  if(!todayEvs.length){
    html+=`</div><div class="empty-events"><span class="ei">📭</span><p>今日尚無點餐場次<br>請等待承辦人建立</p></div>`;
    return html;
  }
  todayEvs.forEach(ev=>{
    const closed=isEventClosed(ev);
    const status=fmtDeadline(ev);
    const ords=S.orders[ev.id]||[];
    const cnt=ords.length;
    html+=`<div class="event-card${closed?' closed-card':''}" onclick="openEvent('${ev.id}')">
      <div class="ec-top">
        <div class="ec-left">
          <div class="ec-badges">
            <span class="badge ${status.cls}">${status.text}</span>
          </div>
          <div class="ec-title">${esc(ev.title)}</div>
          ${ev.organizer?`<div class="ec-organizer">👤 承辦：${esc(ev.organizer)}</div>`:''}
        </div>
        <div class="ec-right">
          <div class="ec-deadline-label">截止時間</div>
          <div class="ec-deadline">${ev.deadline}</div>
        </div>
      </div>
      <div class="ec-bot">
        <div class="ec-store">🏪 ${esc(ev.store_name||'（尚未設定店家）')}</div>
        <div class="ec-count${cnt===0?' none':' ok'}">${cnt} 人已點餐</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}
function openEvent(eid){
  if(isEventClosed(S.events.find(e=>e.id===eid))){ toast('此場次已截止','warn'); return; }
  S.activeEventId=eid; S.cart={};
  render();
}

/* ── ORDER PAGE ── */
function renderOrderPage(){
  const ev=S.events.find(e=>e.id===S.activeEventId);
  if(!ev) return '<div class="empty"><span class="ei">❌</span><p>找不到此場次</p></div>';
  const items=S.items[S.activeEventId]||[];
  const closed=isEventClosed(ev);

  let html=`
    <div class="order-page-header">
      <button class="back-btn" onclick="S.activeEventId=null;S.cart={};render()">← 返回場次</button>
      <div class="event-info-banner">
        <strong>${esc(ev.title)}</strong>
        ${ev.organizer?`承辦：${esc(ev.organizer)}　`:''}截止：${ev.deadline}　${ev.store_name?`店家：${esc(ev.store_name)}`:''}
      </div>
    </div>`;

  if(closed) html+=`<div style="background:var(--rdl);border:1.5px solid #fca5a5;border-radius:var(--rmd);padding:10px 13px;font-size:.8rem;color:var(--rd);font-weight:700;margin-bottom:12px;text-align:center">⛔ 此場次已截止，無法點餐</div>`;
  else html+=`<div class="notice"><span>💡</span><span>這是<strong>內部意向蒐集</strong>，統計後由承辦人向店家點餐，請填好姓名班級再送出。</span></div>`;

  html+=`<div class="id-card">
    <div class="fld"><label>姓名</label><input class="inp" id="uName" placeholder="王小明" value="${esc(S.myName)}"></div>
    <div class="fld"><label>班級</label>
      <select class="sel" id="uClass">
        <option value="">請選擇</option>
        ${CLASSES.map(c=>`<option value="${c}"${S.myClass===c?' selected':''}>${c}</option>`).join('')}
      </select>
    </div>
  </div>`;

  // 菜單
  const byRest={};
  items.forEach(it=>{ if(!byRest[it.restaurant]) byRest[it.restaurant]=[]; byRest[it.restaurant].push(it); });
  if(!items.length) html+='<div class="empty"><span class="ei">🍽️</span><p>尚無品項，承辦人尚未設定菜單</p></div>';
  else Object.entries(byRest).forEach(([rest,its])=>{
    html+=`<div class="rest-block"><div class="rest-name">🏪 ${esc(rest)}</div><div class="menu-grid">`;
    its.forEach(item=>{
      const keys=Object.keys(S.cart).filter(k=>k.startsWith(item.id+'__'));
      const totalQty=keys.reduce((s,k)=>s+(S.cart[k]?.qty||0),0);
      const hasSpec=item.specs&&item.specs.length>0;
      html+=`<div class="m-card${totalQty>0?' sel':''}">
        <span class="m-emoji">${esc(item.emoji)}</span>
        <div class="m-name">${esc(item.name)}</div>
        ${item.description?`<div class="m-desc">${esc(item.description)}</div>`:''}
        ${item.price>0?`<div class="m-price">$${item.price}</div>`:'<div class="m-price" style="color:var(--sll)">詢價</div>'}
        ${hasSpec?`<div class="m-spec">點擊選規格 ›</div>`:''}
        <div class="qty-row" onclick="event.stopPropagation()">
          <button class="qb" onclick="event.stopPropagation();adjCart('${item.id}',-1)">−</button>
          <span class="qn">${totalQty}</span>
          <button class="qb" onclick="event.stopPropagation();${hasSpec?`openSpec('${item.id}')`:`quickAdd('${item.id}')`}">＋</button>
        </div>
      </div>`;
    });
    html+='</div></div>';
  });

  // 購物車預覽
  const cartKeys=Object.keys(S.cart);
  if(cartKeys.length){
    let total=0;
    html+=`<div class="cart-panel"><div class="fbe" style="margin-bottom:9px"><span style="font-weight:700;font-size:.85rem">📋 確認清單</span><button class="btn btn-out btn-sm" onclick="S.cart={};render()">清空</button></div>`;
    cartKeys.forEach(k=>{
      const ci=S.cart[k]; if(!ci) return;
      total+=ci.price*ci.qty;
      html+=`<div class="cart-row">
        <div><span>${esc(ci.emoji)} ${esc(ci.name)} <strong style="color:var(--or)">× ${ci.qty}</strong></span>
          ${ci.specsStr?`<div class="cart-spec">${esc(ci.specsStr)}</div>`:''}
          ${ci.note?`<div class="cart-note">備註：${esc(ci.note)}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:7px">
          ${ci.price>0?`<span style="font-weight:700">$${ci.price*ci.qty}</span>`:''}
          <button class="qb" onclick="removeKey('${k}')" style="border-color:transparent;color:var(--sll)">✕</button>
        </div>
      </div>`;
    });
    if(total>0) html+=`<div class="cart-total"><span>合計</span><span>$${total}</span></div>`;
    html+='</div>';
  }
  html+=`<div style="margin-top:12px">
    <label style="font-size:.68rem;font-weight:700;color:var(--sll);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">整體備註</label>
    <input class="inp" id="orderNote" placeholder="例：統一領取地點、特殊需求…" style="font-size:.82rem">
  </div>`;
  return html;
}

/* ── CART OPS ── */
function quickAdd(id){
  const ev=S.events.find(e=>e.id===S.activeEventId);
  if(isEventClosed(ev)){toast('此場次已截止','err');return;}
  const key=id+'__';
  if(!S.cart[key]){const item=(S.items[S.activeEventId]||[]).find(i=>i.id===id);S.cart[key]={itemId:id,name:item.name,emoji:item.emoji,qty:0,price:item.price,specsStr:'',note:''};}
  S.cart[key].qty++;render();
}
function adjCart(id,d){
  const ev=S.events.find(e=>e.id===S.activeEventId);
  if(d>0&&isEventClosed(ev)){toast('此場次已截止','err');return;}
  const keys=Object.keys(S.cart).filter(k=>k.startsWith(id+'__'));
  if(!keys.length&&d>0){quickAdd(id);return;}
  if(keys.length){const k=keys[keys.length-1];S.cart[k].qty=Math.max(0,S.cart[k].qty+d);if(!S.cart[k].qty)delete S.cart[k];}
  render();
}
function removeKey(k){delete S.cart[k];render();}

/* ── SPEC SHEET ── */
function openSpec(id){
  const ev=S.events.find(e=>e.id===S.activeEventId);
  if(isEventClosed(ev)){toast('此場次已截止','err');return;}
  S.specItem=(S.items[S.activeEventId]||[]).find(i=>i.id===id);
  S.specSel={};
  (S.specItem.specs||[]).forEach(sp=>{if(sp.opts.length)S.specSel[sp.cat]=sp.opts[0];});
  S.specQty=1;S.specNote='';
  renderSheet();
  document.getElementById('specOverlay').style.display='flex';
}
function renderSheet(){
  const item=S.specItem;
  document.getElementById('sheetTitle').innerHTML=`${esc(item.emoji)} ${esc(item.name)}${item.price>0?` <span style="color:var(--or);font-size:.9rem">$${item.price}</span>`:''}`;
  let html='';
  (item.specs||[]).forEach(sp=>{
    html+=`<div class="spec-sec"><div class="spec-lbl">${esc(sp.cat)}</div><div class="spec-opts">
      ${sp.opts.map(o=>`<button class="spec-opt${S.specSel[sp.cat]===o?' on':''}" onclick="S.specSel['${esc(sp.cat)}']='${esc(o)}';renderSheet()">${esc(o)}</button>`).join('')}
    </div></div>`;
  });
  html+=`<div class="spec-sec"><div class="spec-lbl">數量</div>
    <div class="sheet-qty">
      <button class="sqb" onclick="if(S.specQty>1){S.specQty--;renderSheet()}">−</button>
      <span class="sqn">${S.specQty}</span>
      <button class="sqb" onclick="S.specQty++;renderSheet()">＋</button>
      ${item.price>0?`<span style="font-family:'Nunito',sans-serif;font-weight:800;color:var(--or);margin-left:6px">$${item.price*S.specQty}</span>`:''}
    </div>
  </div>
  <div class="spec-sec"><div class="spec-lbl">備註</div>
    <textarea class="note-inp" rows="2" placeholder="例：不要辣…" oninput="S.specNote=this.value">${esc(S.specNote)}</textarea>
  </div>`;
  document.getElementById('sheetBody').innerHTML=html;
}
function confirmSpec(){
  const item=S.specItem;
  const specsStr=Object.values(S.specSel).join('/');
  const key=item.id+'__'+specsStr+'__'+Date.now();
  S.cart[key]={itemId:item.id,name:item.name,emoji:item.emoji,qty:S.specQty,price:item.price,specsStr,note:S.specNote};
  closeSpec();render();toast('已加入清單 ✓','ok');
}
function closeSpec(){document.getElementById('specOverlay').style.display='none';}

/* ── SUBMIT ── */
async function submitOrder(){
  const ev=S.events.find(e=>e.id===S.activeEventId);
  if(isEventClosed(ev)){toast('此場次已截止','err');return;}
  const nameEl=document.getElementById('uName'),clsEl=document.getElementById('uClass');
  S.myName=nameEl?.value.trim()||S.myName;
  S.myClass=clsEl?.value||S.myClass;
  if(!S.myName){toast('請輸入姓名','err');return;}
  if(!S.myClass){toast('請選擇班級','err');return;}
  const cartKeys=Object.keys(S.cart);
  if(!cartKeys.length){toast('請至少選一項','err');return;}
  const noteEl=document.getElementById('orderNote');
  const total=cartKeys.reduce((s,k)=>s+S.cart[k].price*S.cart[k].qty,0);
  const orderPayload={menu_id:S.activeEventId,user_name:S.myName,class_name:S.myClass,note:noteEl?.value.trim()||'',total};
  const itemsPayload=cartKeys.map(k=>{const ci=S.cart[k];return{item_id:ci.itemId,item_name:ci.name,item_emoji:ci.emoji,quantity:ci.qty,unit_price:ci.price,specs_str:ci.specsStr,note:ci.note};});
  document.getElementById('subBtn').disabled=true;
  const{error}=await dbInsertOrder(orderPayload,itemsPayload);
  if(error){toast('送出失敗：'+error.message,'err');document.getElementById('subBtn').disabled=false;return;}
  S.cart={};
  toast(`✅ ${S.myName} 點餐送出！`,'ok');
  render();
}

function doQuery(){
  const name=document.getElementById('qName')?.value.trim()||'';
  const cls=document.getElementById('qClass')?.value||'';
  S.myName=name; S.myClass=cls;
  const results=[];
  S.events.forEach(ev=>{
    const ords=S.orders[ev.id]||[];
    ords.forEach(o=>{
      if(name&&!o.user_name.includes(name)) return;
      if(cls&&o.class_name!==cls) return;
      results.push({ev,o});
    });
  });
  S.myRecs=results; render();
}
async function doDelete(id,menuId){
  const{error}=await dbDeleteOrder(id,menuId);
  if(error){toast('刪除失敗','err');return;}
  S.delId=null;
  S.myRecs=(S.myRecs||[]).filter(r=>r.o.id!==id);
  toast('已取消點餐紀錄','ok'); render();
}

/* ── IMAGE + AI ── */
async function handleImg(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const zone=document.querySelector('.upload-zone');
    if(zone) zone.innerHTML=`<img src="${e.target.result}" class="menu-preview-img"><div style="margin-top:6px;font-size:.72rem;color:var(--in)">點擊更換圖片</div><input type="file" id="imgInp" accept="image/*" style="display:none" onchange="handleImg(event)">`;
  };
  reader.readAsDataURL(file);
  if(!DEMO){
    const eid=S.adminEid;
    const ext=file.name.split('.').pop();
    const path=`menus/${eid}_${Date.now()}.${ext}`;
    const{error}=await sb.storage.from('menu-images').upload(path,file,{upsert:true});
    if(!error){
      const{data:pub}=sb.storage.from('menu-images').getPublicUrl(path);
      await sb.from('menus').update({img_url:pub.publicUrl}).eq('id',eid);
      const ev=S.events.find(e=>e.id===eid); if(ev) ev.img_url=pub.publicUrl;
    }
  }
  await aiParse(file);
}
async function aiParse(file){
  const statusEl=document.getElementById('aiStatus');
  if(statusEl) statusEl.innerHTML=`<div class="scan-ldr"><div class="spin"></div>AI 正在解析菜單圖片…</div>`;
  try{
    const base64=await toBase64(file); const mime=file.type||'image/jpeg';
    let parsed=[];
    if(false){  // 由後端 proxy 處理，不需要前端 Key
      await new Promise(r=>setTimeout(r,1500));
      parsed=[{restaurant:'AI解析店家',emoji:'🍱',name:'示範品項A',price:80,description:''},{restaurant:'AI解析店家',emoji:'🍜',name:'示範品項B',price:65,description:''}];
      toast('示範模式：請填入真實 Claude API Key','warn');
    } else {
      const res=await fetch('/.netlify/functions/claude-proxy',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:base64}},
          {type:'text',text:`請解析這張菜單圖片，回傳純 JSON 陣列，不要有任何其他文字或 markdown：\n[{"restaurant":"店家名稱","emoji":"emoji","name":"品項名稱","price":數字,"description":"描述"}]\n無法辨識則回傳 []。`}
        ]}]})});
      if(!res.ok) throw new Error(`API 錯誤 ${res.status}`);
      const d=await res.json();
      parsed=JSON.parse((d.content?.[0]?.text||'[]').replace(/```json?|```/g,'').trim());
    }
    if(!Array.isArray(parsed)||!parsed.length){
      if(statusEl) statusEl.innerHTML=`<div style="font-size:.75rem;color:var(--am);margin-top:7px">⚠️ AI 無法識別，請手動新增品項</div>`;
      return;
    }
    const eid=S.adminEid;
    if(!S.items[eid]) S.items[eid]=[];
    const newItems=parsed.map((it,i)=>({id:'ai-'+Date.now()+'-'+i,menu_id:eid,restaurant:it.restaurant||'本日菜單',emoji:it.emoji||'🍱',name:it.name||'未知品項',description:it.description||'',price:Number(it.price)||0,specs:[],sort_order:S.items[eid].length+i,ai_parsed:true}));
    S.items[eid]=[...S.items[eid],...newItems];
    if(statusEl) statusEl.innerHTML=`<div style="font-size:.75rem;color:var(--gr);margin-top:7px">✅ AI 成功解析 ${newItems.length} 個品項，確認後按儲存菜單</div>`;
    toast(`AI 解析完成！新增了 ${newItems.length} 個品項`,'ok');
    render();
  }catch(err){
    console.error(err);
    if(statusEl) statusEl.innerHTML=`<div style="font-size:.75rem;color:var(--rd);margin-top:7px">❌ 解析失敗：${err.message}</div>`;
    toast('AI 解析失敗','err');
  }
}
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

/* ── EXPORT ── */
function copyKitchen(){
  const kitch={};const ords=S.orders[S.adminEid]||[];
  ords.forEach(o=>(o.order_items||[]).forEach(oi=>{const k=oi.item_name+(oi.specs_str?'('+oi.specs_str+')':'');kitch[k]=(kitch[k]||0)+oi.quantity;}));
  let txt='【廚房備餐清單】\n\n';
  const ev=S.events.find(e=>e.id===S.adminEid);
  if(ev) txt+=`場次：${ev.title}　承辦：${ev.organizer||'—'}\n\n`;
  Object.entries(kitch).forEach(([n,q])=>txt+=`${n} × ${q}\n`);
  txt+=`\n合計：${Object.values(kitch).reduce((s,q)=>s+q,0)} 份`;
  copyText(txt);
}
function exportCSV(){
  const ords=S.orders[S.adminEid]||[];
  const ev=S.events.find(e=>e.id===S.adminEid);
  const rows=[['場次','承辦','時間','班級','姓名','品項','規格','數量','單價','小計','備註']];
  ords.forEach(o=>(o.order_items||[]).forEach((oi,i)=>{
    rows.push([i===0?ev?.title||'':'',i===0?ev?.organizer||'':'',i===0?fmtTime(o.created_at):'',
      i===0?o.class_name:'',i===0?o.user_name:'',
      oi.item_emoji+oi.item_name,oi.specs_str||'',oi.quantity,oi.unit_price,oi.quantity*oi.unit_price,i===0?o.note||'':'']);
  }));
  dlCSV(rows,`點餐紀錄_${ev?.title||''}`);
}
function dlCSV(rows,name){
  if(rows.length<=1){toast('沒有資料','warn');return;}
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`${name}_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;a.click();toast('CSV 已匯出','ok');
}
function copyText(txt){try{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已複製','ok');}catch(e){toast('複製失敗','err');}}

/* ── UTILS ── */
function toast(msg,type='info'){const w=document.getElementById('toastWrap');const el=document.createElement('div');el.className='toast '+type;const ic={ok:'✅',err:'❌',warn:'⚠️',info:'ℹ️'};el.innerHTML=`<span>${ic[type]||'ℹ️'}</span><span>${msg}</span>`;w.appendChild(el);setTimeout(()=>el.remove(),2800);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtTime(iso){try{return new Date(iso).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}catch{return '';}}
</script>
